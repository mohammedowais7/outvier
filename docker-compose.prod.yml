services:
  redis:
    image: redis:7-alpine
    networks:
      - internal
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-outvier}
      POSTGRES_USER: ${POSTGRES_USER:-outvier}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-outvierpw}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change_me}
      DJANGO_DEBUG: "False"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOW_ALL: "True"
      USE_SQLITE: "False"
      # Prefer DATABASE_URL; fallback to POSTGRES_* if needed
      DATABASE_URL: postgres://${POSTGRES_USER:-outvier}:${POSTGRES_PASSWORD:-outvierpw}@db:5432/${POSTGRES_DB:-outvier}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
    depends_on:
      - db
      - redis
    networks:
      - internal

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change_me}
      DJANGO_DEBUG: "False"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOW_ALL: "True"
      USE_SQLITE: "False"
      DATABASE_URL: postgres://${POSTGRES_USER:-outvier}:${POSTGRES_PASSWORD:-outvierpw}@db:5432/${POSTGRES_DB:-outvier}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
    command: bash -lc "celery -A api worker -l info"
    depends_on:
      - db
      - redis
    networks:
      - internal

  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change_me}
      DJANGO_DEBUG: "False"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOW_ALL: "True"
      USE_SQLITE: "False"
      DATABASE_URL: postgres://${POSTGRES_USER:-outvier}:${POSTGRES_PASSWORD:-outvierpw}@db:5432/${POSTGRES_DB:-outvier}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
    command: bash -lc "celery -A api beat -l info"
    depends_on:
      - db
      - redis
    networks:
      - internal

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-:80}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - internal

volumes:
  pgdata:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
